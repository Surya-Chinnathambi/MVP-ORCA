# NAV: full variable reference: PT-Orc-index.md MRK:IDX_S3 | system map: next line
# PT-Orc docs: README (start) | index.md (orientation) | llm.md (functions) | deep.md (design) | action-plan.md (tasks)
# =============================================================================
# pt-orc.conf — Engagement configuration. Edit ONCE per engagement before running.
# TechGuard. | Suite v0.8
# =============================================================================
# All scripts source this file automatically. Place alongside the scripts.
# =============================================================================

# =============================================================================
# ENGAGEMENT IDENTITY
# =============================================================================

# MSF workspace name  must be unique per engagement.
# Used by all scripts to create/select the correct Metasploit workspace.
# Convention: <ClientCode>-<EngType>-<MonYear>-Orc-<SuiteVer>
# IMPORTANT: set this before first run; must match the MSF workspace name in the DB.
# If changed mid-engagement: msfconsole -x "workspace -a <newname>"
PROJECT_NAME="TG-PTE-Jun2026-Orc"

# Engagement mode: pte (external/black-box) | pti (internal/white-box)
# pte  targets come from TARGET_DOMAINS/TARGET_IPS/scripts/targets.txt
# pti  targets come from TARGET_SUBNETS and/or TARGET_IPS
MODE="pte"

# =============================================================================
# TARGETS
# =============================================================================

# Domains to enumerate  space-separated (01_dns_recon.sh)
TARGET_DOMAINS="testphp.vulnweb.com"
# Example: TARGET_DOMAINS="example.com corp.example.com www.example.com"

# Individual IPs provided directly in scope  space-separated (01, 02, 03)
# PTE: added unconditionally alongside DNS-resolved IPs
# PTI: individual hosts outside subnet ranges
TARGET_IPS="10.10.9.1"
# NOTE: 10.10.9.1 is RFC1918 — pre-seeded directly in scripts/targets.txt
# because PTE dns_recon filters private IPs. All other steps (03-07) read
# targets.txt and will scan it normally.
# Example: TARGET_IPS="185.1.2.3 185.1.2.4 203.0.113.10"

# Internal subnets  CIDR ranges, space-separated (03_comp_scan.sh only)
# PTI: primary target specification
# PTE: MUST be empty  targets must come from DNS recon or explicit IPs
TARGET_SUBNETS=""
# PTE mode: must be empty — targets come from DNS recon output (scripts/targets.txt)
# PTI example: TARGET_SUBNETS="192.168.1.0/24 192.168.10.0/24 10.0.0.0/16"

# =============================================================================
# TESTER IDENTIFICATION
# =============================================================================

# Outbound egress IP  verified before any active probe (01_dns_recon, 03_scan)
# Scripts abort if actual outbound IP does not match. Leave empty to skip check.
TESTER_IP=""
# Left empty — source IP verification skipped for this run

# Additional IPs to exclude from scans  space-separated (03_comp_scan)
# Auto-detection covers all local IPv4 at startup. Add jump boxes or secondary
# hosts that are not visible on local interfaces.
TESTER_EXCLUDE_IPS=""
# Example: TESTER_EXCLUDE_IPS="10.10.5.50 172.16.0.99"

# =============================================================================
# STEALTH TIER
# =============================================================================

# Default scan tier: ghost | normal | loud | evasion
# ghost     OT/fragile devices, ultra-slow (masscan 500pps, T1 nmap)
# normal    standard; default for both PTI and PTE
# loud      lab/time-critical environments (masscan 10000pps, T4 nmap)
# evasion   active filtering detected; T1, source-port 443, fragmented, slow
GLOBAL_TIER="ghost"

# Per-subnet tier overrides  "CIDR:tier" entries (03_comprehensive_scan only)
# Overrides GLOBAL_TIER for any IP within the given CIDR.
# PTE: leave as empty array (GLOBAL_TIER applies to all targets)
# PTI example: SUBNET_TIER_MAP=("192.168.1.0/24:loud" "192.168.10.0/24:ghost")
SUBNET_TIER_MAP=()
# PTE: empty — GLOBAL_TIER applies to all external targets

# =============================================================================
# API KEYS  leave empty to skip that data source
# =============================================================================

SHODAN_API_KEY=""
CENSYS_API_ID=""
CENSYS_API_SECRET=""
SECURITYTRAILS_API_KEY=""

# WPScan API token  required for CVE/vulnerability data (06_wpscan.sh)
# Free tier: 25 API calls/day. Register at https://wpscan.com/register
# Without token WPScan still runs but shows no CVE details.
WPSCAN_API_TOKEN=""
WPSCAN_API_BUDGET=25   # set to 0 to disable API (useful when budget exhausted)

# =============================================================================
# DNS RECON OPTIONS (01_dns_recon.sh)
# =============================================================================

# amass brute-force  generates significant DNS traffic against nameservers.
# Requires explicit RoE authorisation before enabling for PTE. Default: 0.
AMASS_BRUTE=0

# =============================================================================
# SCAN TUNING (03_comp_scan.sh)
# =============================================================================

# Run optional ARP discovery phase before TCP scan (PTI-only; PTE skips regardless)
#   1 = run ARP sweep as first phase when --phase all (default)
#   0 = skip discovery entirely
# ARP is fast on L2-local subnets and authoritative (cannot be firewalled below L2).
RUN_DISCOVERY=1

# Use ARP discovery results to narrow Pass 1 TCP target list
#   1 = for on-link subnets with ARP-live hosts, replace CIDR with live-host list
#       (unions with any TARGET_IPS falling inside the subnet). Routed subnets
#       keep full CIDR (ARP cannot cross a gateway).
#   0 = always scan full CIDR regardless of ARP results (legacy behaviour).
# Fallback: if discovery produced 0 hosts on an on-link subnet, falls back to
# full CIDR (conservative  assumes ARP missed them rather than subnet is empty).
USE_DISCOVERY_FOR_TCP=1

# masscan packet-per-second rates per tier
MASSCAN_RATE_GHOST=500
MASSCAN_RATE_NORMAL=5000
MASSCAN_RATE_LOUD=10000

# Fast TCP Pass 1 backend: masscan | naabu | db_nmap
FAST_TCP_SCANNER="masscan"

# naabu worker concurrency for Pass 1 when FAST_TCP_SCANNER="masscan"
# Per-tier values let loud/normal/ghost track the existing tier model.
NAABU_THREADS_GHOST=10
NAABU_THREADS_NORMAL=25
NAABU_THREADS_LOUD=40

# Legacy/global fallback if a per-tier value is unset
NAABU_THREADS=25
NAABU_TIMEOUT=1500
NAABU_RETRIES=1

# db_nmap fast full-port Pass 1 tuning when FAST_TCP_SCANNER="db_nmap"
# LOUD matches the exact high-speed preset discussed in chat.
# GHOST/NORMAL stay aggressive but leave more room for lossy or rate-limited nets.
DB_NMAP_FAST_MIN_RATE_GHOST=2000
DB_NMAP_FAST_MIN_RATE_NORMAL=8000
DB_NMAP_FAST_MIN_RATE_LOUD=20000
DB_NMAP_FAST_MAX_RATE_GHOST=15000
DB_NMAP_FAST_MAX_RATE_NORMAL=50000
DB_NMAP_FAST_MAX_RATE_LOUD=120000
DB_NMAP_FAST_MIN_HOSTGROUP_GHOST=4
DB_NMAP_FAST_MIN_HOSTGROUP_NORMAL=8
DB_NMAP_FAST_MIN_HOSTGROUP_LOUD=16
DB_NMAP_FAST_MAX_HOSTGROUP_GHOST=8
DB_NMAP_FAST_MAX_HOSTGROUP_NORMAL=16
DB_NMAP_FAST_MAX_HOSTGROUP_LOUD=32
DB_NMAP_FAST_MAX_RETRIES_GHOST=2
DB_NMAP_FAST_MAX_RETRIES_NORMAL=2
DB_NMAP_FAST_MAX_RETRIES_LOUD=1
DB_NMAP_FAST_INITIAL_RTT_TIMEOUT_GHOST=150ms
DB_NMAP_FAST_INITIAL_RTT_TIMEOUT_NORMAL=100ms
DB_NMAP_FAST_INITIAL_RTT_TIMEOUT_LOUD=50ms
DB_NMAP_FAST_MAX_RTT_TIMEOUT_GHOST=500ms
DB_NMAP_FAST_MAX_RTT_TIMEOUT_NORMAL=350ms
DB_NMAP_FAST_MAX_RTT_TIMEOUT_LOUD=200ms
DB_NMAP_FAST_HOST_TIMEOUT_GHOST=8m
DB_NMAP_FAST_HOST_TIMEOUT_NORMAL=4m
DB_NMAP_FAST_HOST_TIMEOUT_LOUD=3m
DB_NMAP_FAST_DEFEAT_RST_RATELIMIT_GHOST=1
DB_NMAP_FAST_DEFEAT_RST_RATELIMIT_NORMAL=1
DB_NMAP_FAST_DEFEAT_RST_RATELIMIT_LOUD=1

# Max concurrent masscan jobs (Pass 1 fast sweep)
MAX_PARALLEL_SCANS=1

# Force masscan to use a specific network interface (empty = auto-detect)
# Set explicitly if masscan picks the wrong interface on multi-homed hosts.
MASSCAN_INTERFACE=""

# =============================================================================
# FILE PATHS  relative to engagement working directory
# Usually no need to change these.
# =============================================================================

# Produced by 01_dns_recon.sh  consumed by 02_ip_range_analysis + 03_scan
PTE_TARGETS_FILE="targets.txt"

# Produced by 05_web_enum.sh  consumed by 06_wpscan.sh
WP_TARGETS_FILE="wp_targets.txt"

# =============================================================================
# VAPT-ENHANCED: Threat Intel API Keys (02_ip_analysis.sh — Steps 8 & 9)
# Leave empty to skip — no penalty for missing keys
# =============================================================================

# AbuseIPDB — https://www.abuseipdb.com/api (free: 1000 req/day)
ABUSEIPDB_API_KEY=""

# VirusTotal — https://www.virustotal.com/gui/my-apikey (free: 4 req/min)
VIRUSTOTAL_API_KEY=""

# =============================================================================
# VAPT-ENHANCED: WPScan Aggressive Mode (06_wpscan.sh)
# =============================================================================
# Set to 1 to enable all-plugins/all-themes enumeration (--aggressive flag)
# WARNING: generates significantly more HTTP requests — use ghost/evasion tier
WPSCAN_AGGRESSIVE_DEFAULT=0

# =============================================================================
# ORCHESTRATOR EXPORT (08_app_api_review.sh, 09_ai_llm_review.sh, 12_report_pack.sh)
# Fill these in before running steps 8, 9, or 12.
# =============================================================================

# UUID of the corresponding project in TG Audit Orchestrator.
# Copy from the URL bar on the project page: /ui/projects/<UUID>
# Required by 12_report_pack.sh — script will abort if empty.
ORCHESTRATOR_PROJECT_ID="dd486fc2-e9ec-4cca-939f-91857e890361"

# Engagement profile — must match ptorc_adapter valid profiles:
#   external | internal | web | api | ai_llm | cloud | ad | hybrid | retest
ENGAGEMENT_PROFILE="external"

# Testing depth:  baseline | standard | deep | retest
TESTING_DEPTH="standard"

# Authentication level available to testers:
#   none | user | admin | service_account
AUTH_LEVEL="none"

# Rules of engagement summary (free text, written into scope.json)
RULES_OF_ENGAGEMENT="No DoS. Testing within agreed window only. No production data exfiltration."

# Engagement window — YYYY-MM-DD format. Left empty = today ± 14 days.
WINDOW_START=""
WINDOW_END=""
