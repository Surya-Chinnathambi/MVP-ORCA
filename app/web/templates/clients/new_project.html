{% extends "base.html" %}
{% block title %}New Project — {{ client.name }}{% endblock %}
{% block content %}
<div class="mb-4">
  <a href="/ui/clients" class="text-blue-600 hover:underline text-sm">← Clients</a>
</div>
<h1 class="text-2xl font-bold text-gray-800 mb-6">New Project — {{ client.name }}</h1>

<div class="bg-white rounded-lg shadow p-6 max-w-md">
  <form action="/ui/clients/{{ client.id }}/projects" method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Service Type *</label>
      <select name="service_type" required
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="dpdp">DPDP (Compliance)</option>
        <option value="vapt">VAPT (Security Testing)</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Scope Summary</label>
      <textarea name="scope_summary" rows="3"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
        placeholder="Brief description of project scope…"></textarea>
    </div>
    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded text-sm font-medium">
      Create Project
    </button>
  </form>
</div>
{% endblock %}
