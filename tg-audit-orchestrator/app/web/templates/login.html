<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — TG Audit Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-sm">
    <h1 class="text-xl font-bold text-gray-800 mb-6">TG Audit Orchestrator</h1>
    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 px-3 py-2 rounded mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}
    <form action="/ui/login" method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" required autofocus
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-medium text-sm">
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
