{% extends "portal/base.html" %}
{% block title %}Upload Evidence — Client Portal{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold text-blue-900 mb-1">Upload Evidence</h1>
  <p class="text-gray-500 mb-6">Files you upload enter the evidence review queue at intake status.</p>

  {% if message %}
  <div class="mb-4 px-4 py-3 rounded {{ 'bg-green-100 text-green-800' if success else 'bg-red-100 text-red-800' }}">
    {{ message }}
  </div>
  {% endif %}

  <div class="bg-white rounded-lg shadow p-6">
    <form action="/portal/upload" method="post" enctype="multipart/form-data" hx-boost="false">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Evidence Request (optional)</label>
        <select name="evidence_request_id" class="w-full border rounded px-3 py-2 text-sm">
          <option value="">— Not linked to a specific request —</option>
          {% for er in evidence_requests %}
          <option value="{{ er.id }}">{{ er.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">File</label>
        <input type="file" name="file" required
               class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4
                      file:rounded file:border-0 file:text-sm file:font-semibold
                      file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        <p class="mt-1 text-xs text-gray-400">PDF, DOCX, XLSX, images up to 20 MB</p>
      </div>
      <button type="submit"
              class="bg-blue-700 text-white px-5 py-2 rounded hover:bg-blue-800 font-medium text-sm">
        Upload
      </button>
    </form>
  </div>
</div>
{% endblock %}
