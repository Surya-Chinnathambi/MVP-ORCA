<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Client Portal — TG Audit{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="flex h-screen bg-gray-50 text-gray-800 text-sm" hx-boost="true">
  <!-- Sidebar -->
  <nav class="w-52 bg-blue-900 text-blue-100 flex flex-col flex-shrink-0">
    <div class="px-4 py-3 font-bold text-base border-b border-blue-700 tracking-wide">
      Client Portal
    </div>
    <div class="flex-1 overflow-y-auto py-2">
      <a href="/portal/dashboard" class="flex items-center px-4 py-2 hover:bg-blue-700 rounded mx-1">Dashboard</a>
      <a href="/portal/upload" class="flex items-center px-4 py-2 hover:bg-blue-700 rounded mx-1">Upload Evidence</a>
      <a href="/portal/questions" class="flex items-center px-4 py-2 hover:bg-blue-700 rounded mx-1">Questions</a>
      <a href="/portal/tasks" class="flex items-center px-4 py-2 hover:bg-blue-700 rounded mx-1">Tasks</a>
    </div>
    <div class="px-4 py-3 border-t border-blue-700 text-xs text-blue-300">
      <div class="truncate">{{ user.email }}</div>
      <form action="/ui/logout" method="post" class="mt-1" hx-boost="false">
        <button type="submit" class="text-blue-300 hover:text-white underline">Logout</button>
      </form>
    </div>
  </nav>
  <!-- Main content -->
  <main class="flex-1 overflow-auto p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
