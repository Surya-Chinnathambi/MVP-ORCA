<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TG Audit Orchestrator{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="flex h-screen bg-gray-100 text-gray-800 text-sm" hx-boost="true">
  <!-- Sidebar -->
  <nav class="w-52 bg-gray-900 text-gray-100 flex flex-col flex-shrink-0">
    <div class="px-4 py-3 font-bold text-base border-b border-gray-700 tracking-wide">
      TG Audit
    </div>
    <div class="flex-1 overflow-y-auto py-2">
      <div class="px-4 pt-3 pb-1 text-xs font-semibold text-gray-500 uppercase tracking-wider">Workspace</div>
      <a href="/ui/clients" class="flex items-center px-4 py-2 hover:bg-gray-700 rounded mx-1">Clients</a>
      <a href="/ui/approvals" class="flex items-center px-4 py-2 hover:bg-gray-700 rounded mx-1">Approvals</a>
      <div class="px-4 pt-3 pb-1 text-xs font-semibold text-gray-500 uppercase tracking-wider">Admin</div>
      <a href="/ui/admin/users" class="flex items-center px-4 py-2 hover:bg-gray-700 rounded mx-1">Team &amp; Roles</a>
    </div>
    <div class="px-4 py-3 border-t border-gray-700 text-xs text-gray-400">
      <div class="truncate">{{ user.email }}</div>
      <form action="/ui/logout" method="post" class="mt-1" hx-boost="false">
        <button type="submit" class="text-gray-400 hover:text-white underline">Logout</button>
      </form>
    </div>
  </nav>
  <!-- Main content -->
  <main class="flex-1 overflow-auto p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
